<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员端 - 图书馆管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .header { background: #303133; color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; }
        .header .user-info { display: flex; align-items: center; gap: 15px; }
        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        .content { background: #fff; border-radius: 8px; padding: 20px; min-height: 500px; }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <h3>📚 图书馆 - 管理后台</h3>
        <div class="user-info">
            <span>管理员：{{ user.name }}</span>
            <el-button size="small" type="danger" plain @click="logout">退出</el-button>
        </div>
    </div>
    <div class="container">
        <el-tabs v-model="activeTab" type="border-card">
            <!-- 图书管理 -->
            <el-tab-pane label="图书管理" name="books">
                <div style="margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                    <el-input v-model="searchKeyword" placeholder="搜索书名/作者" style="width:250px" clearable></el-input>
                    <el-select v-model="searchCategory" placeholder="分类筛选" style="width:150px" clearable>
                        <el-option v-for="c in categories" :key="c" :label="c" :value="c"></el-option>
                    </el-select>
                    <el-button type="primary" @click="loadBooks">搜索</el-button>
                    <el-button type="success" @click="showAddBookDialog">新增图书</el-button>
                </div>
                <el-table :data="books" border stripe v-loading="bookLoading">
                    <el-table-column prop="id" label="ID" width="60"></el-table-column>
                    <el-table-column prop="title" label="书名" width="160"></el-table-column>
                    <el-table-column prop="author" label="作者" width="120"></el-table-column>
                    <el-table-column prop="category" label="分类" width="100"></el-table-column>
                    <el-table-column prop="publisher" label="出版社" width="140"></el-table-column>
                    <el-table-column prop="isbn" label="ISBN" width="130"></el-table-column>
                    <el-table-column label="可借/总数" width="100">
                        <template #default="s">{{ s.row.availableQuantity }} / {{ s.row.totalQuantity }}</template>
                    </el-table-column>
                    <el-table-column label="操作" width="180">
                        <template #default="s">
                            <el-button size="small" @click="showEditBookDialog(s.row)">编辑</el-button>
                            <el-popconfirm title="确定删除此书？" @confirm="deleteBook(s.row.id)">
                                <template #reference><el-button size="small" type="danger">删除</el-button></template>
                            </el-popconfirm>
                        </template>
                    </el-table-column>
                </el-table>
            </el-tab-pane>

            <!-- 读者管理 -->
            <el-tab-pane label="读者管理" name="readers">
                <el-table :data="readers" border stripe v-loading="readerLoading">
                    <el-table-column prop="id" label="ID" width="60"></el-table-column>
                    <el-table-column prop="name" label="用户名" width="130"></el-table-column>
                    <el-table-column prop="phone" label="联系电话" width="150">
                        <template #default="s">{{ s.row.phone || '-' }}</template>
                    </el-table-column>
                    <el-table-column prop="role" label="角色" width="100">
                        <template #default="s">
                            <el-tag :type="s.row.role === 'admin' ? 'danger' : 'info'" size="small">{{ s.row.role }}</el-tag>
                        </template>
                    </el-table-column>
                </el-table>
            </el-tab-pane>

            <!-- 借阅记录 -->
            <el-tab-pane label="借阅记录" name="borrows">
                <el-table :data="borrowRecords" border stripe v-loading="borrowLoading">
                    <el-table-column prop="id" label="ID" width="60"></el-table-column>
                    <el-table-column prop="userName" label="借阅人" width="120"></el-table-column>
                    <el-table-column prop="bookTitle" label="书名" width="180"></el-table-column>
                    <el-table-column prop="borrowDate" label="借阅日期" width="170"></el-table-column>
                    <el-table-column prop="dueDate" label="应还日期" width="170"></el-table-column>
                    <el-table-column prop="returnDate" label="归还日期" width="170">
                        <template #default="s">{{ s.row.returnDate || '-' }}</template>
                    </el-table-column>
                    <el-table-column prop="status" label="状态" width="100">
                        <template #default="s">
                            <el-tag :type="s.row.status === 'BORROWED' ? 'warning' : 'success'" size="small">
                                {{ s.row.status === 'BORROWED' ? '借阅中' : '已归还' }}
                            </el-tag>
                        </template>
                    </el-table-column>
                </el-table>
            </el-tab-pane>
        </el-tabs>
    </div>

    <!-- 新增/编辑图书对话框 -->
    <el-dialog v-model="bookDialogVisible" :title="isEdit ? '编辑图书' : '新增图书'" width="550px">
        <el-form :model="bookForm" :rules="bookRules" ref="bookFormRef" label-width="90px">
            <el-form-item label="书名" prop="title">
                <el-input v-model="bookForm.title"></el-input>
            </el-form-item>
            <el-form-item label="作者" prop="author">
                <el-input v-model="bookForm.author"></el-input>
            </el-form-item>
            <el-form-item label="ISBN">
                <el-input v-model="bookForm.isbn"></el-input>
            </el-form-item>
            <el-form-item label="分类">
                <el-input v-model="bookForm.category"></el-input>
            </el-form-item>
            <el-form-item label="出版社">
                <el-input v-model="bookForm.publisher"></el-input>
            </el-form-item>
            <el-form-item label="出版日期">
                <el-date-picker v-model="bookForm.publishDate" type="date" placeholder="选择日期" style="width:100%" value-format="YYYY-MM-DD"></el-date-picker>
            </el-form-item>
            <el-form-item label="简介">
                <el-input v-model="bookForm.description" type="textarea" rows="3"></el-input>
            </el-form-item>
            <el-form-item label="总数量" prop="totalQuantity">
                <el-input-number v-model="bookForm.totalQuantity" :min="1" :max="999"></el-input-number>
            </el-form-item>
            <el-form-item label="可借数量" prop="availableQuantity">
                <el-input-number v-model="bookForm.availableQuantity" :min="0" :max="999"></el-input-number>
            </el-form-item>
        </el-form>
        <template #footer>
            <el-button @click="bookDialogVisible = false">取消</el-button>
            <el-button type="primary" @click="saveBook" :loading="saveLoading">保存</el-button>
        </template>
    </el-dialog>
</div>
<script>
const { createApp, ref, reactive, onMounted } = Vue
const { ElMessage } = ElementPlus

createApp({
    setup() {
        const user = ref(JSON.parse(sessionStorage.getItem('user') || '{}'))
        const activeTab = ref('books')
        const searchKeyword = ref('')
        const searchCategory = ref('')

        const books = ref([])
        const categories = ref([])
        const readers = ref([])
        const borrowRecords = ref([])
        const bookLoading = ref(false)
        const readerLoading = ref(false)
        const borrowLoading = ref(false)

        const bookDialogVisible = ref(false)
        const isEdit = ref(false)
        const saveLoading = ref(false)
        const bookFormRef = ref(null)
        const bookForm = reactive({
            id: null, title: '', author: '', isbn: '', category: '', publisher: '', publishDate: '', description: '', totalQuantity: 1, availableQuantity: 1
        })
        const bookRules = {
            title: [{ required: true, message: '请输入书名', trigger: 'blur' }],
            author: [{ required: true, message: '请输入作者', trigger: 'blur' }],
            totalQuantity: [{ required: true, message: '请输入总数量', trigger: 'blur' }],
            availableQuantity: [{ required: true, message: '请输入可借数量', trigger: 'blur' }]
        }

        if (!user.value.id || user.value.role !== 'admin') {
            location.href = '/index.html'
            return {}
        }

        async function loadBooks() {
            bookLoading.value = true
            try {
                const params = {}
                if (searchKeyword.value) params.keyword = searchKeyword.value
                if (searchCategory.value) params.category = searchCategory.value
                const res = await axios.get('/api/books', { params })
                books.value = res.data.data || []
            } catch (e) { ElMessage.error('加载图书失败') }
            bookLoading.value = false
        }

        async function loadCategories() {
            try {
                const res = await axios.get('/api/books/categories')
                categories.value = res.data.data || []
            } catch (e) {}
        }

        async function loadReaders() {
            readerLoading.value = true
            try {
                const res = await axios.get('/api/readers')
                readers.value = res.data.data || []
            } catch (e) { ElMessage.error('加载读者失败') }
            readerLoading.value = false
        }

        async function loadBorrowRecords() {
            borrowLoading.value = true
            try {
                const res = await axios.get('/api/borrows/all')
                borrowRecords.value = res.data.data || []
            } catch (e) { ElMessage.error('加载借阅记录失败') }
            borrowLoading.value = false
        }

        function showAddBookDialog() {
            isEdit.value = false
            Object.assign(bookForm, { id: null, title: '', author: '', isbn: '', category: '', publisher: '', publishDate: '', description: '', totalQuantity: 1, availableQuantity: 1 })
            bookDialogVisible.value = true
        }

        function showEditBookDialog(book) {
            isEdit.value = true
            Object.assign(bookForm, {
                id: book.id, title: book.title, author: book.author, isbn: book.isbn || '',
                category: book.category || '', publisher: book.publisher || '',
                publishDate: book.publishDate || '', description: book.description || '',
                totalQuantity: book.totalQuantity, availableQuantity: book.availableQuantity
            })
            bookDialogVisible.value = true
        }

        async function saveBook() {
            const valid = await bookFormRef.value.validate().catch(() => false)
            if (!valid) return
            saveLoading.value = true
            try {
                let res
                if (isEdit.value) {
                    res = await axios.put('/api/books/' + bookForm.id, bookForm)
                } else {
                    res = await axios.post('/api/books', bookForm)
                }
                if (res.data.code === 0) {
                    ElMessage.success(res.data.msg)
                    bookDialogVisible.value = false
                    loadBooks()
                    loadCategories()
                } else {
                    ElMessage.error(res.data.msg)
                }
            } catch (e) { ElMessage.error('操作失败') }
            saveLoading.value = false
        }

        async function deleteBook(id) {
            try {
                const res = await axios.delete('/api/books/' + id)
                if (res.data.code === 0) {
                    ElMessage.success('删除成功')
                    loadBooks()
                    loadCategories()
                } else {
                    ElMessage.error(res.data.msg)
                }
            } catch (e) { ElMessage.error('删除失败') }
        }

        function logout() {
            sessionStorage.clear()
            location.href = '/index.html'
        }

        // 切换 tab 时加载数据
        function handleTabChange(name) {
            if (name === 'books') loadBooks()
            else if (name === 'readers') loadReaders()
            else if (name === 'borrows') loadBorrowRecords()
        }

        onMounted(() => {
            loadBooks()
            loadCategories()
        })

        return {
            user, activeTab, searchKeyword, searchCategory,
            books, categories, readers, borrowRecords,
            bookLoading, readerLoading, borrowLoading,
            bookDialogVisible, isEdit, saveLoading, bookFormRef, bookForm, bookRules,
            showAddBookDialog, showEditBookDialog, saveBook, deleteBook,
            loadBooks, loadReaders, loadBorrowRecords, handleTabChange, logout
        }
    }
}).use(ElementPlus).mount('#app')
</script>
</body>
</html>
